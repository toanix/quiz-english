<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Tiếng Anh 10 – Giữa HKII</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --gold: #e6ac2c;
    --gold2: #f5c842;
    --red: #f85149;
    --green: #3fb950;
    --blue: #58a6ff;
    --text: #e6edf3;
    --muted: #8b949e;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(230,172,44,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(88,166,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 70%, rgba(230,172,44,0.1) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 90%, rgba(88,166,255,0.1) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .screen { display: none; width: 100%; max-width: 820px; padding: 24px 16px 60px; position: relative; z-index: 1; }
  .screen.active { display: block; }

  #start-screen { text-align: center; padding-top: 60px; }

  .logo-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(230,172,44,0.12); border: 1px solid rgba(230,172,44,0.3);
    border-radius: 999px; padding: 6px 16px;
    font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em;
    color: var(--gold); text-transform: uppercase; margin-bottom: 28px;
  }

  h1.main-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 900; line-height: 1.15;
    background: linear-gradient(135deg, #e6ac2c 0%, #f5c842 50%, #e6ac2c 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 12px;
  }

  .subtitle { color: var(--muted); font-size: 1rem; margin-bottom: 36px; }

  .stats-row {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 40px;
  }

  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 24px; text-align: center;
    min-width: 120px;
  }
  .stat-card .num { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--gold); }
  .stat-card .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  .mode-list {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 12px; margin-bottom: 40px;
  }

  .mode-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; text-align: left;
    cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .mode-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--gold); opacity: 0;
    transition: opacity 0.2s;
  }
  .mode-card:hover, .mode-card.selected {
    border-color: var(--gold); background: rgba(230,172,44,0.07);
  }
  .mode-card:hover::before, .mode-card.selected::before { opacity: 1; }
  .mode-card.selected { box-shadow: 0 0 0 1px var(--gold); }

  .mode-card .mode-num { font-size: 0.7rem; color: var(--gold); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
  .mode-card .mode-name { font-size: 0.88rem; font-weight: 600; margin-top: 4px; line-height: 1.3; }
  .mode-card .mode-count { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }

  .btn-start {
    background: linear-gradient(135deg, #e6ac2c, #f5c842);
    color: #0d1117; border: none; border-radius: var(--radius);
    padding: 16px 48px; font-size: 1.05rem; font-weight: 700;
    font-family: 'Be Vietnam Pro', sans-serif;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(230,172,44,0.35); }
  .btn-start:active { transform: translateY(0); }

  #quiz-screen { padding-top: 20px; }

  .quiz-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; gap: 12px; flex-wrap: wrap;
  }

  .mode-badge {
    background: rgba(230,172,44,0.12); border: 1px solid rgba(230,172,44,0.25);
    border-radius: 999px; padding: 5px 14px;
    font-size: 0.72rem; font-weight: 700; color: var(--gold);
    letter-spacing: 0.08em; text-transform: uppercase;
  }

  .q-counter { font-size: 0.85rem; color: var(--muted); font-weight: 600; }
  .q-counter span { color: var(--text); font-weight: 700; }

  .progress-bar-wrap {
    width: 100%; height: 6px; background: var(--border);
    border-radius: 999px; margin-bottom: 28px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, #e6ac2c, #f5c842);
    border-radius: 999px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  .segment-progress {
    display: flex; gap: 3px; margin-bottom: 22px; flex-wrap: wrap;
  }
  .seg-dot {
    flex: 1; min-width: 6px; max-width: 16px; height: 6px;
    border-radius: 999px; background: var(--border);
    transition: background 0.3s;
  }
  .seg-dot.correct { background: var(--green); }
  .seg-dot.wrong { background: var(--red); }
  .seg-dot.current { background: var(--gold); }

  .question-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; margin-bottom: 16px;
    animation: slideIn 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  /* Layout 2 cột cho reading */
  #quiz-layout-container {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
  }
  
  .passage-panel {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    max-height: 600px;
    overflow-y: auto;
    position: sticky;
    top: 20px;
  }
  
  .passage-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  
  .passage-content {
    font-size: 0.95rem;
    line-height: 1.8;
    color: var(--text);
  }
  
  .passage-content p {
    margin-bottom: 12px;
  }
  
  .question-panel {
    flex: 1;
  }
  
  /* Khi không có passage, question-panel chiếm full width */
  #quiz-layout-container:not(:has(.passage-panel[style*="display: block"])) .question-panel {
    flex: none;
    width: 100%;
  }
  
  @media (max-width: 900px) {
    #quiz-layout-container {
      flex-direction: column;
    }
    
    .passage-panel {
      position: static;
      max-height: 400px;
    }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-text {
    font-size: 1.05rem; font-weight: 600; line-height: 1.6;
    margin-bottom: 20px;
  }

  .question-image {
    width: 100%;
    max-width: 500px;
    margin: 20px auto;
    display: block;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .option-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 18px;
    text-align: left; cursor: pointer; transition: all 0.18s;
    font-size: 0.92rem; font-family: 'Be Vietnam Pro', sans-serif;
    color: var(--text); font-weight: 500; line-height: 1.5;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--gold); background: rgba(230,172,44,0.08);
    transform: translateX(3px);
  }
  .option-btn .opt-label {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--border); display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700; flex-shrink: 0; margin-top: 1px;
    transition: all 0.18s;
  }
  .option-btn:hover:not(:disabled) .opt-label { background: var(--gold); color: #0d1117; }

  .option-btn.selected { border-color: var(--gold); background: rgba(230,172,44,0.08); }
  .option-btn.selected .opt-label { background: var(--gold); color: #0d1117; }

  .option-btn.correct {
    border-color: var(--green); background: rgba(63,185,80,0.1);
    pointer-events: none;
  }
  .option-btn.correct .opt-label { background: var(--green); color: #0d1117; }

  .option-btn.wrong {
    border-color: var(--red); background: rgba(248,81,73,0.1);
    pointer-events: none;
  }
  .option-btn.wrong .opt-label { background: var(--red); color: #fff; }

  .option-btn.disabled-plain { opacity: 0.5; pointer-events: none; }

  .tf-statement {
    background: var(--surface2);
    padding: 14px;
    border-radius: var(--radius);
    margin-bottom: 8px;
    font-weight: 500;
    border-left: 3px solid var(--border);
    font-size: 0.9rem;
    line-height: 1.5;
  }

  .tf-buttons {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .tf-btn {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
    font-size: 0.85rem;
    background: var(--surface2);
    color: var(--text);
  }

  .tf-btn:hover:not(.disabled) {
    border-color: var(--gold);
    background: rgba(230,172,44,0.08);
  }

  .tf-btn.selected-true {
    background: rgba(63,185,80,0.15);
    border-color: var(--green);
    color: var(--green);
  }

  .tf-btn.selected-false {
    background: rgba(248,81,73,0.15);
    border-color: var(--red);
    color: var(--red);
  }

  .tf-btn.correct {
    background: rgba(63,185,80,0.2) !important;
    border-color: var(--green) !important;
    color: var(--green) !important;
  }

  .tf-btn.wrong {
    background: rgba(248,81,73,0.2) !important;
    border-color: var(--red) !important;
    color: var(--red) !important;
  }

  .tf-btn.disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .short-answer-container {
    background: var(--surface2);
    padding: 20px;
    border-radius: var(--radius);
  }

  .short-answer-inputs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .answer-input {
    width: 50px;
    height: 50px;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 1.3rem;
    text-align: center;
    transition: all 0.2s;
    background: var(--surface);
    font-weight: 700;
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
  }

  .answer-input:focus {
    outline: none;
    border-color: var(--gold);
    background: rgba(230,172,44,0.08);
  }

  .answer-input.correct {
    border-color: var(--green) !important;
    background: rgba(63,185,80,0.15) !important;
    color: var(--green) !important;
  }

  .answer-input.incorrect {
    border-color: var(--red) !important;
    background: rgba(248,81,73,0.15) !important;
    color: var(--red) !important;
  }

  .answer-input.disabled {
    cursor: not-allowed;
    opacity: 0.7;
  }

  .short-answer-hint {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    margin-top: 12px;
    font-style: italic;
  }

  .short-answer-unit {
    text-align: center;
    margin-top: 12px;
    padding: 10px;
    background: rgba(230,172,44,0.12);
    color: var(--gold);
    border-radius: 8px;
    font-weight: 600;
    font-size: 0.9rem;
    border: 1px solid rgba(230,172,44,0.3);
  }

  .correct-answer-display {
    margin-top: 16px;
    padding: 12px;
    background: rgba(63,185,80,0.12);
    border: 1px solid rgba(63,185,80,0.3);
    border-radius: 8px;
    text-align: center;
    font-weight: 600;
    color: var(--green);
    font-size: 0.95rem;
  }

  /* Writing styles */
  .writing-container {
    margin-top: 20px;
  }
  
  .writing-prompt {
    margin-bottom: 20px;
    line-height: 1.6;
  }
  
  .writing-input-area {
    margin-top: 16px;
  }
  
  .writing-textarea {
    width: 100%;
    min-height: 120px;
    padding: 16px;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 0.95rem;
    font-family: 'Be Vietnam Pro', sans-serif;
    line-height: 1.6;
    resize: vertical;
    transition: all 0.2s;
  }
  
  .writing-textarea:focus {
    outline: none;
    border-color: var(--gold);
    background: rgba(230,172,44,0.05);
  }
  
  .writing-textarea::placeholder {
    color: var(--muted);
  }
  
  .writing-hint {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 10px;
    margin-bottom: 16px;
  }

  .feedback-box {
    border-radius: var(--radius); padding: 14px 18px;
    font-size: 0.88rem; font-weight: 600; margin-bottom: 16px;
    display: none; align-items: center; gap: 10px; line-height: 1.5;
  }
  .feedback-box.show { display: flex; }
  .feedback-box.correct-fb { background: rgba(63,185,80,0.12); border: 1px solid rgba(63,185,80,0.3); color: #7ee787; }
  .feedback-box.wrong-fb { background: rgba(248,81,73,0.12); border: 1px solid rgba(248,81,73,0.3); color: #ff7b72; }

  .btn-check {
    background: linear-gradient(135deg, #e6ac2c, #f5c842);
    color: #0d1117; border: none; border-radius: var(--radius);
    padding: 12px 24px; font-size: 0.9rem; font-weight: 700;
    font-family: 'Be Vietnam Pro', sans-serif;
    cursor: pointer; transition: all 0.2s;
    display: none; margin-top: 12px; width: 100%;
  }
  .btn-check.show { display: block; }
  .btn-check:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(230,172,44,0.3); }

  .btn-next {
    background: linear-gradient(135deg, #e6ac2c, #f5c842);
    color: #0d1117; border: none; border-radius: var(--radius);
    padding: 14px 36px; font-size: 0.95rem; font-weight: 700;
    font-family: 'Be Vietnam Pro', sans-serif;
    cursor: pointer; transition: all 0.2s;
    display: none; width: 100%;
  }
  .btn-next.show { display: block; }
  .btn-next:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(230,172,44,0.3); }

  #result-screen { text-align: center; padding-top: 40px; }

  .result-ring-wrap { display: flex; justify-content: center; margin-bottom: 28px; }

  .result-ring {
    width: 160px; height: 160px; position: relative;
  }
  .result-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 10; }
  .ring-fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1); }
  .ring-center {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .ring-pct { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 900; }
  .ring-lbl { font-size: 0.72rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }

  .result-title {
    font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900;
    margin-bottom: 8px;
  }
  .result-sub { color: var(--muted); margin-bottom: 32px; }

  .result-stats {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-bottom: 36px;
  }
  .res-stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 20px; min-width: 100px;
  }
  .res-stat .rs-num { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; }
  .res-stat .rs-lbl { font-size: 0.72rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
  .res-stat.green .rs-num { color: var(--green); }
  .res-stat.red .rs-num { color: var(--red); }
  .res-stat.gold .rs-num { color: var(--gold); }

  .result-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  .btn-restart, .btn-back {
    border-radius: var(--radius); padding: 13px 28px;
    font-size: 0.92rem; font-weight: 700; cursor: pointer;
    font-family: 'Be Vietnam Pro', sans-serif; transition: all 0.2s;
    border: none;
  }
  .btn-restart {
    background: linear-gradient(135deg, #e6ac2c, #f5c842); color: #0d1117;
  }
  .btn-restart:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(230,172,44,0.3); }
  .btn-back {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-back:hover { border-color: var(--gold); color: var(--gold); }

  .review-section { margin-top: 40px; text-align: left; }
  .review-title {
    font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700;
    margin-bottom: 16px; color: var(--gold);
  }
  .review-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  }
  .review-item .ri-q { font-size: 0.88rem; font-weight: 600; margin-bottom: 8px; line-height: 1.5; }
  .review-item .ri-row { font-size: 0.82rem; margin-top: 4px; line-height: 1.5; }
  .ri-wrong-ans { color: var(--red); }
  .ri-right-ans { color: var(--green); }

  @media (max-width: 600px) {
    .answer-input {
      width: 45px;
      height: 45px;
      font-size: 1.1rem;
    }
  }
</style>
</head>
<body>

<div class="screen active" id="start-screen">
  <div class="logo-badge">📚 Ôn tập giữa HKII</div>
  <h1 class="main-title">Quiz Tiếng Anh 10</h1>
  <p class="subtitle">Đề cương kiểm tra giữa kì 2</p>

  <div class="stats-row">
    <div class="stat-card"><div class="num" id="total-questions">0</div><div class="lbl">Câu hỏi</div></div>
    <div class="stat-card"><div class="num" id="total-modes">0</div><div class="lbl">Chế độ</div></div>
    <div class="stat-card"><div class="num">∞</div><div class="lbl">Thời gian</div></div>
  </div>

  <div class="mode-list" id="mode-list">
    <!-- Modes will be generated dynamically -->
  </div>

  <button class="btn-start" id="btn-start">🎯 Bắt đầu làm bài</button>
</div>

<div class="screen" id="quiz-screen">
  <div class="quiz-header">
    <div class="mode-badge" id="cur-mode-badge">Tổng hợp</div>
    <div class="q-counter">Câu <span id="q-cur">1</span> / <span id="q-total">50</span></div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar"></div>
  </div>
  <div class="segment-progress" id="seg-progress"></div>

  <!-- Layout 2 cột cho reading passages -->
  <div id="quiz-layout-container">
    <!-- Passage panel (ẩn nếu không phải reading) -->
    <div class="passage-panel" id="passage-panel" style="display:none;">
      <div class="passage-title">📖 Đoạn văn</div>
      <div class="passage-content" id="passage-content"></div>
    </div>
    
    <!-- Question panel -->
    <div class="question-panel">
      <div class="question-card" id="question-card">
        <div class="q-text" id="q-text"></div>
        <div id="q-image-container"></div>
        <div id="q-content"></div>
      </div>
    </div>
  </div>

  <div class="feedback-box" id="feedback-box"></div>
  <button class="btn-next" id="btn-next">Câu tiếp theo →</button>
</div>

<div class="screen" id="result-screen">
  <div class="result-ring-wrap">
    <div class="result-ring">
      <svg viewBox="0 0 160 160">
        <circle class="ring-bg" cx="80" cy="80" r="65"/>
        <circle class="ring-fill" id="ring-fill" cx="80" cy="80" r="65"/>
      </svg>
      <div class="ring-center">
        <div class="ring-pct" id="ring-pct">0%</div>
        <div class="ring-lbl">Điểm số</div>
      </div>
    </div>
  </div>

  <div class="result-title" id="result-title">Xuất sắc!</div>
  <div class="result-sub" id="result-sub"></div>

  <div class="result-stats">
    <div class="res-stat green"><div class="rs-num" id="rs-correct">0</div><div class="rs-lbl">Đúng</div></div>
    <div class="res-stat red"><div class="rs-num" id="rs-wrong">0</div><div class="rs-lbl">Sai</div></div>
    <div class="res-stat gold"><div class="rs-num" id="rs-total">0</div><div class="rs-lbl">Tổng câu</div></div>
  </div>

  <div class="result-btns">
    <button class="btn-restart" id="btn-restart">🔄 Làm lại</button>
    <button class="btn-back" id="btn-back">← Chọn chế độ khác</button>
  </div>

  <div class="review-section" id="review-section">
    <div class="review-title">📋 Các câu trả lời sai</div>
    <div id="review-list"></div>
  </div>
</div>

<script src="quiz-data.js"></script>
<script>
// HÀM HELPER ĐỂ RENDER KATEX SAU KHI THAY ĐỔI DOM
function refreshMath() {
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false}
      ],
      throwOnError: false
    });
  }
}

// STATE
let questions = [], qIdx = 0, answers = [], selectedMode = 'all';
const LABELS = ['A','B','C','D'];
const MODE_NAMES = {
  'all': 'Tổng hợp',
  'reading1-p1': 'P1: Gender',
  'reading1-p2': 'P2: Vietnam',
  'reading1-p3': 'P3: Brain',
  'reading2': 'Reading 2',
  'sentence-building': 'Writing'
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function normalizeNumberAnswer(str) {
  if (str == null) return '';
  return String(str)
    .trim()
    .replace(/\s+/g, '')
    .replace(',', '.');
}

function prepareQuestions(mode) {
  const modeData = QUIZ_DATA.modes.find(m => m.id === mode);
  if (!modeData) return [];
  return shuffle([...modeData.questions]);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// START SCREEN
// Event listeners for mode cards are now handled in initModes()

document.getElementById('btn-start').addEventListener('click', startQuiz);
document.getElementById('btn-restart').addEventListener('click', startQuiz);
document.getElementById('btn-back').addEventListener('click', () => showScreen('start-screen'));

function startQuiz() {
  questions = prepareQuestions(selectedMode);
  qIdx = 0;
  answers = new Array(questions.length).fill(null);
  buildSegDots();
  showScreen('quiz-screen');
  renderQuestion();
}

function buildSegDots() {
  const seg = document.getElementById('seg-progress');
  seg.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'seg-dot';
    d.id = `dot-${i}`;
    seg.appendChild(d);
  });
}

function updateDot(i, state) {
  const d = document.getElementById(`dot-${i}`);
  if (d) { d.className = 'seg-dot ' + state; }
}

function renderQuestion() {
  const q = questions[qIdx];
  document.getElementById('q-cur').textContent = qIdx + 1;
  document.getElementById('q-total').textContent = questions.length;
  document.getElementById('cur-mode-badge').textContent = MODE_NAMES[selectedMode] || 'Tổng hợp';
  document.getElementById('progress-bar').style.width = `${((qIdx) / questions.length) * 100}%`;

  if (qIdx > 0 && answers[qIdx-1] !== null) {
    const isCorrect = checkAnswer(qIdx-1);
    updateDot(qIdx-1, isCorrect ? 'correct' : 'wrong');
  }
  updateDot(qIdx, 'current');

  // Hiển thị passage nếu có
  const passagePanel = document.getElementById('passage-panel');
  const passageContent = document.getElementById('passage-content');
  if (q.passage && PASSAGES[q.passage]) {
    passagePanel.style.display = 'block';
    passageContent.innerHTML = PASSAGES[q.passage];
  } else {
    passagePanel.style.display = 'none';
  }

  document.getElementById('q-text').textContent = q.question || q.prompt || '';
  
  // Image
  const imgContainer = document.getElementById('q-image-container');
  if (q.image) {
    imgContainer.innerHTML = `<img src="${q.image}" alt="Hình minh họa" class="question-image">`;
  } else {
    imgContainer.innerHTML = '';
  }

  const content = document.getElementById('q-content');
  content.innerHTML = '';

  if (q.type === 'tracNghiem') {
    renderMultipleChoice(q, content);
  } else if (q.type === 'writing') {
    renderWriting(q, content);
  } else if (q.type === 'dungSai') {
    renderTrueFalse(q, content);
  } else if (q.type === 'traLoiNgan') {
    renderShortAnswer(q, content);
  }

  document.getElementById('feedback-box').className = 'feedback-box';
  document.getElementById('feedback-box').innerHTML = '';
  document.getElementById('btn-next').classList.remove('show');
  document.getElementById('question-card').style.animation = 'none';
  void document.getElementById('question-card').offsetWidth;
  document.getElementById('question-card').style.animation = '';

  // GỌI KATEX RENDER SAU KHI DOM CẬP NHẬT
  refreshMath();
}

function renderMultipleChoice(q, container) {
  const opts = document.createElement('div');
  opts.className = 'options';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-label">${LABELS[i]}</span><span>${opt}</span>`;
    btn.addEventListener('click', () => selectMultipleChoice(i));
    opts.appendChild(btn);
  });
  container.appendChild(opts);
}

function selectMultipleChoice(idx) {
  if (answers[qIdx] !== null) return;
  answers[qIdx] = idx;
  const q = questions[qIdx];
  const btns = document.querySelectorAll('.option-btn');

  btns.forEach((btn, i) => {
    if (i === q.correct) btn.classList.add('correct');
    else if (i === idx && idx !== q.correct) btn.classList.add('wrong');
    else btn.classList.add('disabled-plain');
    btn.disabled = true;
  });

  showFeedback(idx === q.correct, `Đáp án đúng: ${LABELS[q.correct]}. ${q.options[q.correct]}`);
  refreshMath(); // Render lại công thức trong feedback
}

function renderWriting(q, container) {
  const writingDiv = document.createElement('div');
  writingDiv.className = 'writing-container';
  writingDiv.innerHTML = `
    <div class="writing-prompt">
      <strong>📝 Viết lại câu từ các từ gợi ý:</strong><br>
      <div style="margin-top: 12px; padding: 12px; background: var(--surface2); border-radius: 8px; font-family: monospace; color: var(--gold);">
        ${q.prompt}
      </div>
    </div>
    <div class="writing-input-area">
      <textarea id="writing-input" class="writing-textarea" placeholder="Nhập câu trả lời của bạn vào đây..." rows="4"></textarea>
      <div class="writing-hint">💡 Lưu ý: Viết câu hoàn chỉnh, chú ý ngữ pháp và dấu câu</div>
      <button class="btn-check" id="btn-check-writing">✓ Kiểm tra câu trả lời</button>
    </div>
  `;
  container.appendChild(writingDiv);
  
  const textarea = document.getElementById('writing-input');
  const checkBtn = document.getElementById('btn-check-writing');
  
  // Nếu đã có câu trả lời trước đó
  if (answers[qIdx]) {
    textarea.value = answers[qIdx];
    checkBtn.classList.add('show');
  }
  
  // Tự động hiện nút check khi người dùng gõ
  textarea.addEventListener('input', () => {
    if (textarea.value.trim().length > 0) {
      checkBtn.classList.add('show');
    } else {
      checkBtn.classList.remove('show');
    }
  });
  
  checkBtn.addEventListener('click', submitWriting);
}

function submitWriting() {
  const q = questions[qIdx];
  const userAnswer = document.getElementById('writing-input').value.trim();
  
  if (!userAnswer) {
    alert('Vui lòng nhập câu trả lời!');
    return;
  }
  
  answers[qIdx] = userAnswer;
  document.getElementById('btn-check-writing').style.display = 'none';
  document.getElementById('writing-input').disabled = true;
  document.getElementById('writing-input').style.opacity = '0.6';
  
  // So sánh đơn giản (normalize)
  const normalizeText = (text) => text.toLowerCase().replace(/[,.'";:!?]/g, '').replace(/\s+/g, ' ').trim();
  const isCorrect = normalizeText(userAnswer) === normalizeText(q.answer);
  
  if (!isCorrect) {
    const answerDiv = document.createElement('div');
    answerDiv.className = 'correct-answer-display';
    answerDiv.style.marginTop = '12px';
    answerDiv.innerHTML = `<strong>Đáp án mẫu:</strong><br>${q.answer}`;
    document.querySelector('.writing-input-area').appendChild(answerDiv);
  }
  
  showFeedback(isCorrect, `Đáp án mẫu: ${q.answer}`);
}


function renderTrueFalse(q, container) {
  q.statements.forEach((stmt, idx) => {
    const div = document.createElement('div');
    div.style.marginBottom = '12px';
    
    const stmtDiv = document.createElement('div');
    stmtDiv.className = 'tf-statement';
    stmtDiv.textContent = `${String.fromCharCode(97 + idx)}. ${stmt}`;
    div.appendChild(stmtDiv);
    
    const btnsDiv = document.createElement('div');
    btnsDiv.className = 'tf-buttons';
    
    const btnTrue = document.createElement('button');
    btnTrue.className = 'tf-btn';
    btnTrue.textContent = '✓ Đúng';
    btnTrue.onclick = () => selectTrueFalse(idx, true);
    
    const btnFalse = document.createElement('button');
    btnFalse.className = 'tf-btn';
    btnFalse.textContent = '✗ Sai';
    btnFalse.onclick = () => selectTrueFalse(idx, false);
    
    btnsDiv.appendChild(btnTrue);
    btnsDiv.appendChild(btnFalse);
    div.appendChild(btnsDiv);
    container.appendChild(div);
  });
  
  const checkBtn = document.createElement('button');
  checkBtn.className = 'btn-check';
  checkBtn.id = 'btn-check-tf';
  checkBtn.textContent = '✓ Kiểm tra đáp án';
  checkBtn.onclick = submitTrueFalse;
  container.appendChild(checkBtn);
}

function selectTrueFalse(idx, value) {
  if (!answers[qIdx]) answers[qIdx] = [null, null, null, null];
  answers[qIdx][idx] = value;
  
  const btns = document.querySelectorAll('.tf-buttons')[idx].children;
  btns[0].classList.remove('selected-true');
  btns[1].classList.remove('selected-false');
  if (value === true) btns[0].classList.add('selected-true');
  else btns[1].classList.add('selected-false');
  
  // Check if all answered
  if (answers[qIdx].every(a => a !== null)) {
    document.getElementById('btn-check-tf').classList.add('show');
  }
}

function submitTrueFalse() {
  const q = questions[qIdx];
  const userAnswer = answers[qIdx];
  if (!userAnswer || userAnswer.some(a => a === null)) return;
  
  document.getElementById('btn-check-tf').style.display = 'none';
  
  const allBtns = document.querySelectorAll('.tf-buttons');
  q.correct.forEach((correctVal, idx) => {
    const btns = allBtns[idx].children;
    btns[0].classList.add('disabled');
    btns[1].classList.add('disabled');
    
    if (correctVal === true) {
      btns[0].classList.add('correct');
      if (userAnswer[idx] === false) btns[1].classList.add('wrong');
    } else {
      btns[1].classList.add('correct');
      if (userAnswer[idx] === true) btns[0].classList.add('wrong');
    }
  });
  
  const isCorrect = JSON.stringify(userAnswer) === JSON.stringify(q.correct);
  showFeedback(isCorrect, `Đáp án: ${q.correct.map((c, i) => `${String.fromCharCode(97+i)}: ${c ? 'Đúng' : 'Sai'}`).join(', ')}`);
  refreshMath();
}

function renderShortAnswer(q, container) {
  const answerContainer = document.createElement('div');
  answerContainer.className = 'short-answer-container';
  
  const inputsDiv = document.createElement('div');
  inputsDiv.className = 'short-answer-inputs';
  
  for (let i = 0; i < 4; i++) {
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'answer-input';
    input.maxLength = 1;
    input.dataset.pos = i;
    input.addEventListener('input', (e) => handleShortAnswerInput(e, i));
    input.addEventListener('keydown', (e) => handleShortAnswerKeydown(e, i));
    inputsDiv.appendChild(input);
  }
  answerContainer.appendChild(inputsDiv);
  
  const hint = document.createElement('div');
  hint.className = 'short-answer-hint';
  hint.textContent = '💡 Nhập từng ký tự vào mỗi ô (số 0-9, dấu "-", dấu ",")';
  answerContainer.appendChild(hint);
  
  if (q.unit) {
    const unit = document.createElement('div');
    unit.className = 'short-answer-unit';
    unit.textContent = `Đơn vị: ${q.unit}`;
    answerContainer.appendChild(unit);
  }
  
  const checkBtn = document.createElement('button');
  checkBtn.className = 'btn-check';
  checkBtn.id = 'btn-check-sa';
  checkBtn.textContent = '✓ Kiểm tra đáp án';
  checkBtn.onclick = submitShortAnswer;
  answerContainer.appendChild(checkBtn);
  
  container.appendChild(answerContainer);
  refreshMath();
}

function handleShortAnswerInput(e, pos) {
  let value = e.target.value;
  // Chỉ giữ lại ký tự cuối cùng gõ vào (nếu có)
  if (value.length > 1) {
    value = value[value.length - 1];
  }

  // Ràng buộc: chỉ cho số, "-", ","
  if (!/^[-,0-9,]$/.test(value)) {
    e.target.value = '';
    return;
  }

  // Ràng buộc vị trí:
  // - Ô đầu (pos === 0) KHÔNG được là ","
  // - 3 ô sau (pos > 0) KHÔNG được là "-"
  if ((pos === 0 && value === ',') || (pos > 0 && value === '-')) {
    e.target.value = '';
    return;
  }

  e.target.value = value;
  
  if (!answers[qIdx]) answers[qIdx] = ['', '', '', ''];
  answers[qIdx][pos] = value || '';
  
  // Luôn nhảy sang ô tiếp theo nếu có nhập 1 ký tự hợp lệ
  if (value && pos < 3) {
    const inputs = document.querySelectorAll('.answer-input');
    inputs[pos + 1].focus();
  }
  
  if (answers[qIdx].some(v => v !== '')) {
    document.getElementById('btn-check-sa').classList.add('show');
  }
}

function handleShortAnswerKeydown(e, pos) {
  if (e.key === 'Backspace' && !e.target.value && pos > 0) {
    const inputs = document.querySelectorAll('.answer-input');
    inputs[pos - 1].focus();
  }
}

function submitShortAnswer() {
  const q = questions[qIdx];
  // Đọc trực tiếp từ các ô input để tránh sai lệch mảng answers
  const inputs = Array.from(document.querySelectorAll('.answer-input'));
  const userChars = inputs.map(inp => inp.value || '');
  const userAnswer = userChars.join('');
  const correctAnswer = q.correct;
  
  document.getElementById('btn-check-sa').style.display = 'none';
  
  // Cập nhật lại answers[qIdx] cho thống nhất với checkAnswer / review
  answers[qIdx] = userChars;

  const inputsNodeList = document.querySelectorAll('.answer-input');
  const isCorrect = normalizeNumberAnswer(userAnswer) === normalizeNumberAnswer(correctAnswer);
  
  inputsNodeList.forEach(input => {
    input.disabled = true;
    input.classList.add('disabled');
    input.classList.add(isCorrect ? 'correct' : 'incorrect');
  });
  
  if (!isCorrect) {
    const answerDiv = document.createElement('div');
    answerDiv.className = 'correct-answer-display';
    answerDiv.textContent = `Đáp án đúng: ${correctAnswer} ${q.unit || ''}`;
    document.querySelector('.short-answer-container').appendChild(answerDiv);
  }
  
  showFeedback(isCorrect, `Đáp án đúng: ${correctAnswer} ${q.unit || ''}`);
  refreshMath();
}

function showFeedback(isCorrect, correctInfo) {
  const fb = document.getElementById('feedback-box');
  if (isCorrect) {
    fb.className = 'feedback-box show correct-fb';
    fb.innerHTML = '✅ Chính xác! Bạn đã trả lời đúng.';
  } else {
    fb.className = 'feedback-box show wrong-fb';
    fb.innerHTML = `❌ Sai rồi. ${correctInfo}`;
  }

  const btnNext = document.getElementById('btn-next');
  btnNext.classList.add('show');
  btnNext.textContent = qIdx === questions.length - 1 ? '🏁 Xem kết quả' : 'Câu tiếp theo →';
}

function checkAnswer(idx) {
  const q = questions[idx];
  const ans = answers[idx];
  
  if (q.type === 'tracNghiem') {
    return ans === q.correct;
  } else if (q.type === 'dungSai') {
    return ans && JSON.stringify(ans) === JSON.stringify(q.correct);
  } else if (q.type === 'traLoiNgan') {
    return normalizeNumberAnswer((ans || []).join('')) === normalizeNumberAnswer(q.correct);
  } else if (q.type === 'writing') {
    const normalizeText = (text) => text.toLowerCase().replace(/[,.'";:!?]/g, '').replace(/\s+/g, ' ').trim();
    return normalizeText(ans || '') === normalizeText(q.answer || '');
  }
  return false;
}

document.getElementById('btn-next').addEventListener('click', () => {
  if (qIdx < questions.length - 1) {
    qIdx++;
    renderQuestion();
  } else {
    showResults();
  }
});

function showResults() {
  const correct = answers.filter((a, i) => checkAnswer(i)).length;
  const total = questions.length;
  const pct = Math.round((correct / total) * 100);

  const circumference = 2 * Math.PI * 65;
  const fill = document.getElementById('ring-fill');
  fill.style.strokeDasharray = circumference;
  fill.style.strokeDashoffset = circumference;
  
  if (pct >= 80) fill.style.stroke = '#3fb950';
  else if (pct >= 60) fill.style.stroke = '#e6ac2c';
  else fill.style.stroke = '#f85149';

  document.getElementById('ring-pct').textContent = pct + '%';
  document.getElementById('rs-correct').textContent = correct;
  document.getElementById('rs-wrong').textContent = total - correct;
  document.getElementById('rs-total').textContent = total;

  let title, sub;
  if (pct >= 90) { title = '🏆 Xuất sắc!'; sub = 'Bạn đã nắm vững kiến thức. Tuyệt vời!'; }
  else if (pct >= 80) { title = '🌟 Giỏi lắm!'; sub = 'Kết quả rất tốt, tiếp tục phát huy!'; }
  else if (pct >= 60) { title = '👍 Khá tốt!'; sub = 'Bạn đã vượt qua. Cố gắng hơn nữa!'; }
  else { title = '📚 Cần cố gắng thêm!'; sub = 'Hãy ôn lại và thử lại nhé!'; }

  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = sub;

  // Review
  const reviewList = document.getElementById('review-list');
  reviewList.innerHTML = '';
  const wrongOnes = questions.map((q, i) => ({ q, ans: answers[i], i })).filter(({ q, ans, i }) => !checkAnswer(i));
  
  if (wrongOnes.length === 0) {
    reviewList.innerHTML = '<p style="color:var(--green);font-weight:600;">🎉 Bạn không có câu nào sai!</p>';
  } else {
    wrongOnes.forEach(({ q, ans, i }) => {
      const div = document.createElement('div');
      div.className = 'review-item';
      
      let wrongText = '', rightText = '';
      if (q.type === 'tracNghiem') {
        wrongText = `${LABELS[ans]}. ${q.options[ans]}`;
        rightText = `${LABELS[q.correct]}. ${q.options[q.correct]}`;
      } else if (q.type === 'dungSai') {
        wrongText = 'Có phương án sai';
        rightText = q.correct.map((c, idx) => `${String.fromCharCode(97 + idx)}: ${c ? 'Đúng' : 'Sai'}`).join(', ');
      } else if (q.type === 'writing') {
        wrongText = ans || '(Không trả lời)';
        rightText = q.answer;
      } else {
        wrongText = (ans || []).join('');
        rightText = q.correct;
      }
      
      const questionText = q.question || q.prompt || '';
      
      div.innerHTML = `
        <div class="ri-q">Câu ${i + 1}: ${questionText}</div>
        <div class="ri-row ri-wrong-ans">❌ Bạn trả lời: ${wrongText}</div>
        <div class="ri-row ri-right-ans">✅ Đáp án đúng: ${rightText}</div>
      `;
      reviewList.appendChild(div);
    });
  }

  showScreen('result-screen');
  refreshMath(); // Render lại công thức trong phần Review

  requestAnimationFrame(() => {
    setTimeout(() => {
      fill.style.strokeDashoffset = circumference - (pct / 100) * circumference;
    }, 100);
  });
}

// INIT: Tạo mode cards động từ QUIZ_DATA
function initModes() {
  const modeList = document.getElementById('mode-list');
  const allQuestions = QUIZ_DATA.modes.find(m => m.id === 'all').questions;
  
  // Update stats
  document.getElementById('total-questions').textContent = allQuestions.length;
  document.getElementById('total-modes').textContent = QUIZ_DATA.modes.length;
  
  // Generate mode cards
  QUIZ_DATA.modes.forEach((mode, idx) => {
    const card = document.createElement('div');
    card.className = 'mode-card' + (idx === 6 ? ' selected' : '');
    card.dataset.mode = mode.id;
    
    card.innerHTML = `
      <div class="mode-num">${mode.name}</div>
      <div class="mode-name">${mode.id === 'all' ? 'Tất cả câu hỏi' : 'Chủ đề riêng'}</div>
      <div class="mode-count">${mode.questions.length} câu</div>
    `;
    
    modeList.appendChild(card);
    
    card.addEventListener('click', () => {
      document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedMode = mode.id;
    });
  });
}

// Khởi tạo khi trang load
initModes();
</script>
